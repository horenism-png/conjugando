<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>¡Conjugando! - Spanish Verb Board Game</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React and ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Stable Babel Standalone UMD to prevent dynamic import issues -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght=300..700&family=Outfit:wght=100..900&display=swap');
    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at top right, #fef9c3 0%, #fef3c7 30%, #f5f5f7 100%);
      -webkit-tap-highlight-color: transparent;
    }
    .fun-font {
      font-family: 'Fredoka', sans-serif;
    }
    /* Snake board animations */
    .board-cell {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .token-bounce {
      animation: bounceToken 1.5s infinite alternate;
    }
    @keyframes bounceToken {
      0% { transform: translateY(0); }
      100% { transform: translateY(-4px); }
    }
    /* Custom scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
  </style>
</head>
<body class="min-h-screen text-slate-800 antialiased overflow-x-hidden pb-12">
  <div id="root"></div>

  <!-- Specifying data-presets guarantees Babel compiles correctly with the preloaded UMD modules -->
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef } = React;

    // Define the pronouns mapping to Dice 2
    const PRONOUNS = {
      1: { name: "Yo", translation: "I" },
      2: { name: "Tú", translation: "You (informal)" },
      3: { name: "Él / Ella / Ud.", translation: "He / She / You (formal)" },
      4: { name: "Nosotros / as", translation: "We" },
      5: { name: "Vosotros / as", translation: "You all (Spain)" },
      6: { name: "Ellos / Ellas / Uds.", translation: "They / You all (LatAm)" }
    };

    // Base layout flow structures (indices, types, static elements, and default modifiers)
    const BASE_BOARD_STRUCTURE = [
      { id: 0, type: "start", color: "bg-blue-500 text-white border-blue-600", label: "INICIO" },
      { id: 1, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 2, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 3, type: "penalty", penalty: -2, color: "bg-emerald-100 border-emerald-500 text-emerald-800 font-bold", label: "Retrocede -2" },
      { id: 4, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 5, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 6, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 7, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 8, type: "bonus", bonus: 1, color: "bg-pink-100 border-pink-500 text-pink-800 font-bold", label: "Avanza +1" },
      { id: 9, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 10, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 11, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 12, type: "penalty", penalty: -2, color: "bg-emerald-100 border-emerald-500 text-emerald-800 font-bold", label: "Retrocede -2" },
      { id: 13, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 14, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 15, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 16, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 17, type: "bonus", bonus: 2, color: "bg-pink-100 border-pink-500 text-pink-800 font-bold", label: "Avanza +2" },
      { id: 18, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 19, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 20, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 21, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 22, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 23, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 24, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 25, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 26, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 27, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 28, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 29, type: "verb", color: "bg-amber-100 border-amber-400 hover:bg-amber-200" },
      { id: 30, type: "finish", color: "bg-indigo-600 text-white border-indigo-700 font-black", label: "META 🏁" }
    ];

    // Presets definitions
    const VERB_PRESETS = {
      original: [
        "hacer", "acostarse", "conducir", "vestirse", "salir", "repetir", "querer", "venir", 
        "decir", "coger", "dar", "volver", "despertarse", "ver", "seguir", "hervir", "estar", 
        "pensar", "saber", "ir", "preferir", "dormir", "empezar", "tener", "ser"
      ],
      regulares: [
        "hablar", "comer", "vivir", "cantar", "beber", "escribir", "estudiar", "correr", 
        "abrir", "bailar", "aprender", "recibir", "trabajar", "vender", "discutir", "escuchar", 
        "leer", "partir", "viajar", "romper", "subir", "buscar", "decidir", "mirar", "permitir"
      ],
      reflexivos: [
        "levantarse", "lavarse", "ducharse", "peinarse", "afeitarse", "cepillarse", "sentarse", 
        "despedirse", "despertarse", "acostarse", "vestirse", "divertirse", "bañarse", "dormirse", 
        "irse", "reírse", "preocuparse", "llamarse", "probarse", "quedarse", "maquillarse", 
        "quitarse", "enojarse", "secarse", "calmarse"
      ],
      irregulares: [
        "ser", "estar", "tener", "ir", "hacer", "poder", "decir", "querer", "saber", "venir", 
        "ver", "dar", "conocer", "salir", "traer", "oír", "poner", "pedir", "sentir", "pensar", 
        "dormir", "morir", "jugar", "traducir", "caber"
      ],
      massive_pool: [
        "hablar", "comer", "vivir", "hacer", "ser", "estar", "tener", "ir", "poder", "decir", 
        "querer", "saber", "venir", "ver", "dar", "conocer", "salir", "traer", "oír", "poner", 
        "pedir", "sentir", "pensar", "dormir", "morir", "jugar", "escribir", "leer", "estudiar", 
        "aprender", "levantarse", "ducharse", "volver", "preferir", "empezar", "repetir", "vestirse", 
        "acostarse", "despertarse", "conducir", "coger", "seguir", "hervir", "cantar", "beber", 
        "bailar", "viajar", "buscar", "comprar", "vender", "abrir", "cerrar", "correr", "romper", 
        "comenzar", "entender", "recordar", "perder", "encontrar", "pensar", "recibir", "trabajar"
      ]
    };

    // Grid path mapping for a 5-column snake-like layout to display visually
    const GRID_COORDINATES = [
      { r: 0, c: 0 }, { r: 0, c: 1 }, { r: 0, c: 2 }, { r: 0, c: 3 }, { r: 0, c: 4 },
      { r: 1, c: 4 }, { r: 1, c: 3 }, { r: 1, c: 2 }, { r: 1, c: 1 }, { r: 1, c: 0 },
      { r: 2, c: 0 }, { r: 2, c: 1 }, { r: 2, c: 2 }, { r: 2, c: 3 }, { r: 2, c: 4 },
      { r: 3, c: 4 }, { r: 3, c: 3 }, { r: 3, c: 2 }, { r: 3, c: 1 }, { r: 3, c: 0 },
      { r: 4, c: 0 }, { r: 4, c: 1 }, { r: 4, c: 2 }, { r: 4, c: 3 }, { r: 4, c: 4 },
      { r: 5, c: 4 }, { r: 5, c: 3 }, { r: 5, c: 2 }, { r: 5, c: 1 }, { r: 5, c: 0 },
      { r: 6, c: 0 }
    ];

    // Extended player colors array supporting up to 8 players with distinct Tailwind palettes
    const PLAYER_COLORS = [
      { id: 0, name: "Amarillo", color: "#eab308", border: "#ca8a04", bg: "bg-yellow-500", text: "text-yellow-500" },
      { id: 1, name: "Azul", color: "#3b82f6", border: "#2563eb", bg: "bg-blue-500", text: "text-blue-500" },
      { id: 2, name: "Rojo", color: "#ef4444", border: "#dc2626", bg: "bg-red-500", text: "text-red-500" },
      { id: 3, name: "Verde", color: "#22c55e", border: "#16a34a", bg: "bg-green-500", text: "text-green-500" },
      { id: 4, name: "Morado", color: "#a855f7", border: "#9333ea", bg: "bg-purple-500", text: "text-purple-500" },
      { id: 5, name: "Naranja", color: "#f97316", border: "#ea580c", bg: "bg-orange-500", text: "text-orange-500" },
      { id: 6, name: "Rosa", color: "#ec4899", border: "#db2777", bg: "bg-pink-500", text: "text-pink-500" },
      { id: 7, name: "Teal", color: "#14b8a6", border: "#0d9488", bg: "bg-teal-500", text: "text-teal-500" }
    ];

    function App() {
      const [numPlayers, setNumPlayers] = useState(1); // Default to 1 for solo practice
      const [customNames, setCustomNames] = useState({});
      const [gameStarted, setGameStarted] = useState(false);
      const [players, setPlayers] = useState([]);
      const [currentPlayerIdx, setCurrentPlayerIdx] = useState(0);
      const [diceRoll, setDiceRoll] = useState({ move: 1, pronoun: 1 });
      const [isRolling, setIsRolling] = useState(false);
      const [selectedTense, setSelectedTense] = useState("Presente");
      const [userConjugation, setUserConjugation] = useState("");
      const [userSentence, setUserSentence] = useState(""); // User sentence challenge input
      
      // Dynamic Verbs configuration state
      const [currentPresetKey, setCurrentPresetKey] = useState("original");
      const [customVerbsInput, setCustomVerbsInput] = useState("");
      const [boardSpaces, setBoardSpaces] = useState([]);
      
      // AI States & Gamification Streaks
      const [evaluationResult, setEvaluationResult] = useState(null);
      const [isEvaluating, setIsEvaluating] = useState(false);
      const [generatedImageUrl, setGeneratedImageUrl] = useState(null);
      const [isGeneratingImage, setIsGeneratingImage] = useState(false);
      const [streak, setStreak] = useState(0); // Track correct answer streak in Solo Practice Mode
      
      const [gameLog, setGameLog] = useState([]);
      const [apiError, setApiError] = useState("");
      
      // API Settings State
      const [showSettings, setShowSettings] = useState(false);
      const [tempApiKey, setTempApiKey] = useState("");
      const [savedApiKey, setSavedApiKey] = useState("");

      // Mobile Tab State
      const [activeTab, setActiveTab] = useState("board"); // 'board', 'game', 'logs'
      
      // Custom Confirm Dialog Modal State (replacing window.confirm)
      const [customConfirm, setCustomConfirm] = useState({
        show: false,
        message: "",
        onConfirm: null
      });

      // Read saved Gemini key on load
      useEffect(() => {
        const storedKey = localStorage.getItem("gemini_boardgame_api_key") || "";
        setSavedApiKey(storedKey);
        setTempApiKey(storedKey);
      }, []);

      // Build active board spaces based on configured verbs
      useEffect(() => {
        generateBoardVerbs();
      }, [currentPresetKey]);

      const generateBoardVerbs = (forceCustomList = null) => {
        let verbsList = [];
        const sourceList = forceCustomList || customVerbsInput;

        if (currentPresetKey === "custom" && sourceList) {
          // Parse custom comma-separated list
          verbsList = sourceList.split(",")
            .map(v => v.trim().toLowerCase())
            .filter(v => v.length > 0);
          
          // Pad or truncate to exact 25 verbs needed for the board paths
          while (verbsList.length < 25) {
            verbsList.push("hablar"); // default fallback padding
          }
          if (verbsList.length > 25) {
            verbsList = verbsList.slice(0, 25);
          }
        } else if (currentPresetKey === "random") {
          // Shuffle from massive pool
          const shuffledPool = [...VERB_PRESETS.massive_pool].sort(() => 0.5 - Math.random());
          verbsList = shuffledPool.slice(0, 25);
        } else {
          // Standard presets
          verbsList = [...(VERB_PRESETS[currentPresetKey] || VERB_PRESETS.original)];
        }

        // Map verbs into our static element slots
        let verbCounter = 0;
        const mappedSpaces = BASE_BOARD_STRUCTURE.map(space => {
          if (space.type === "verb") {
            const verbLabel = verbsList[verbCounter] || "estudiar";
            verbCounter++;
            return { ...space, label: verbLabel };
          }
          return space;
        });

        setBoardSpaces(mappedSpaces);
      };

      const handlePresetChange = (key) => {
        setCurrentPresetKey(key);
        if (key === "custom" && !customVerbsInput) {
          setCustomVerbsInput("hablar, comer, vivir, sentir, pensar, oír, jugar, poder, querer, saber, salir, entrar, cantar, saltar, correr, reír, sonreír, soñar, amar, odiar, buscar, encontrar, perder, ganar, viajar");
        }
      };

      const applyCustomVerbs = () => {
        setCurrentPresetKey("custom");
        generateBoardVerbs(customVerbsInput);
      };

      const handleNameChange = (playerIndex, name) => {
        setCustomNames(prev => ({
          ...prev,
          [playerIndex]: name
        }));
      };

      // Save user configured key
      const saveSettings = () => {
        localStorage.setItem("gemini_boardgame_api_key", tempApiKey.trim());
        setSavedApiKey(tempApiKey.trim());
        setShowSettings(false);
      };

      // Retrieve the applicable API Key (user saved -> environment default -> empty)
      const getActiveApiKey = () => {
        return savedApiKey.trim() || ""; // Fallback will use standard key if empty string
      };

      // Init game
      const startGame = () => {
        const initPlayers = Array.from({ length: numPlayers }, (_, i) => ({
          id: i,
          name: customNames[i]?.trim() || (numPlayers === 1 ? "Practicante" : `Jugador ${i + 1}`),
          position: 0,
          colorInfo: PLAYER_COLORS[i]
        }));
        setPlayers(initPlayers);
        setCurrentPlayerIdx(0);
        setStreak(0); // Reset practice streak
        setGameStarted(true);
        setGameLog([`¡El juego ha comenzado! Turno de ${initPlayers[0].name}.`]);
        setEvaluationResult(null);
        setGeneratedImageUrl(null);
        setActiveTab("game"); // Default to game/controls on start
      };

      const resetGame = () => {
        setGameStarted(false);
        setPlayers([]);
        setStreak(0);
        setEvaluationResult(null);
        setGeneratedImageUrl(null);
        setActiveTab("board");
      };

      // Play Turn Logic
      const rollDice = async () => {
        if (isRolling) return;
        setIsRolling(true);
        setEvaluationResult(null);
        setGeneratedImageUrl(null);
        setUserConjugation("");
        setUserSentence("");

        let interval;
        let counter = 0;
        interval = setInterval(() => {
          setDiceRoll({
            move: Math.floor(Math.random() * 6) + 1,
            pronoun: Math.floor(Math.random() * 6) + 1
          });
          counter++;
          if (counter > 10) {
            clearInterval(interval);
            
            // Final roll
            const finalMove = Math.floor(Math.random() * 6) + 1;
            const finalPronoun = Math.floor(Math.random() * 6) + 1;
            setDiceRoll({ move: finalMove, pronoun: finalPronoun });
            setIsRolling(false);
            
            processMovement(finalMove, finalPronoun);
            
            // Auto switch tabs on mobile to challenge card so player doesn't have to scroll
            setActiveTab("game");
          }
        }, 80);
      };

      const processMovement = (move, pronounId) => {
        setPlayers(prevPlayers => {
          const updated = [...prevPlayers];
          const player = { ...updated[currentPlayerIdx] };
          let oldPos = player.position;
          let targetPos = oldPos + move;

          // Cap at finish
          if (targetPos >= boardSpaces.length - 1) {
            targetPos = boardSpaces.length - 1;
          }

          let space = boardSpaces[targetPos];
          let extraLog = "";

          // Check for bonus or penalties
          if (space.type === "penalty") {
            const finalPos = Math.max(0, targetPos + space.penalty);
            extraLog = ` ¡Oh no! Cayó en Retroceder. Retrocede a ${boardSpaces[finalPos].label || 'Inicio'}.`;
            targetPos = finalPos;
          } else if (space.type === "bonus") {
            const finalPos = Math.min(boardSpaces.length - 1, targetPos + space.bonus);
            extraLog = ` ¡Qué suerte! Avanza extra a ${boardSpaces[finalPos].label}.`;
            targetPos = finalPos;
          }

          player.position = targetPos;
          updated[currentPlayerIdx] = player;

          // Add log
          const pronounWord = PRONOUNS[pronounId].name;
          const currentVerb = boardSpaces[targetPos].label;
          const logMsg = `🎲 ${player.name} saca ${move} y avanza a la casilla ${targetPos} (${currentVerb}). Debe conjugar: "${pronounWord}".${extraLog}`;
          setGameLog(prev => [logMsg, ...prev]);

          return updated;
        });
      };

      const nextTurn = () => {
        setEvaluationResult(null);
        setGeneratedImageUrl(null);
        setUserConjugation("");
        setUserSentence("");
        setCurrentPlayerIdx((currentPlayerIdx + 1) % numPlayers);
      };

      // Gemini AI Content Evaluation (updated with Sentence checking logic)
      const evaluateConjugation = async () => {
        const activePlayer = players[currentPlayerIdx];
        const currentSpace = boardSpaces[activePlayer.position];
        if (currentSpace.type !== "verb" && currentSpace.type !== "start") return;

        const currentKey = getActiveApiKey();
        if (!currentKey) {
          setApiError("⚠️ Por favor configure su API Key de Gemini en los ajustes (icono de engranaje en la esquina superior derecha) para poder usar la evaluación automática de Inteligencia Artificial.");
          setIsEvaluating(false);
          return;
        }

        setIsEvaluating(true);
        setApiError("");

        const verbToConjugate = currentSpace.label;
        const subjectPronoun = PRONOUNS[diceRoll.pronoun].name;

        const systemPrompt = `You are a friendly Spanish teacher evaluating board game answers. Check if the user's conjugation of the given Spanish verb matches the requested subject pronoun and tense. Also evaluate the custom Spanish sentence they provided, confirming they correctly used the conjugated verb form in context. Check spelling, syntax, natural syntax flow, and accent marks. Respond only in valid JSON format matching this schema:
        {
          "isCorrect": boolean,
          "correctForm": "string",
          "explanation": "Brief, encouraging explanation in Spanish explaining if the conjugation ending/root is correct, and some context on this verb.",
          "isSentenceCorrect": boolean,
          "sentenceExplanation": "Courteous grammatical review of their sentence in Spanish. Fix any mistakes or suggest a more native/natural way to say it."
        }`;

        const userQuery = `Verb: "${verbToConjugate}". Tense: "${selectedTense}". Subject Pronoun: "${subjectPronoun}". User's Conjugation Attempt: "${userConjugation}". Complete Sentence Attempt using that conjugated verb: "${userSentence}". Check accuracy for both.`;

        try {
          // Exponential backoff setup
          let responseText = "";
          let success = false;
          let retries = 5;
          let delay = 1000;

          for (let attempt = 0; attempt < retries; attempt++) {
            try {
              const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${currentKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: userQuery }] }],
                  systemInstruction: { parts: [{ text: systemPrompt }] },
                  generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                      type: "OBJECT",
                      properties: {
                        isCorrect: { type: "BOOLEAN" },
                        correctForm: { type: "STRING" },
                        explanation: { type: "STRING" },
                        isSentenceCorrect: { type: "BOOLEAN" },
                        sentenceExplanation: { type: "STRING" }
                      },
                      required: ["isCorrect", "correctForm", "explanation", "isSentenceCorrect", "sentenceExplanation"]
                    }
                  }
                })
              });

              if (res.ok) {
                const data = await res.json();
                responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                success = true;
                break;
              }
            } catch (err) {
              if (attempt === retries - 1) throw err;
            }
            await new Promise(resolve => setTimeout(resolve, delay));
            delay *= 2;
          }

          if (success && responseText) {
            const parsed = JSON.parse(responseText);
            setEvaluationResult(parsed);
            
            // Adjust scoring streaks for solo practice mode based on both conjugation AND sentence correctness
            if (parsed.isCorrect && parsed.isSentenceCorrect) {
              setStreak(prev => prev + 1);
            } else {
              setStreak(0);
            }
            
            // Log results
            const conjugationStatus = parsed.isCorrect ? "conjugación ✅" : "conjugación ❌";
            const sentenceStatus = parsed.isSentenceCorrect ? "frase ✅" : "frase ❌";
            const resultMsg = `📋 ${activePlayer.name}: (${conjugationStatus} | ${sentenceStatus}). Intento: "${userConjugation}" y frase: "${userSentence || 'Ninguna'}".`;
            setGameLog(prev => [resultMsg, ...prev]);
          } else {
            throw new Error("No se pudo obtener respuesta del profesor de Inteligencia Artificial.");
          }
        } catch (error) {
          console.error(error);
          setApiError("Hubo un error evaluando con la IA. Prueba de nuevo o valida manualmente.");
        } finally {
          setIsEvaluating(false);
        }
      };

      // Imagen AI Visual Generator
      const generateVisualPrompt = async () => {
        const activePlayer = players[currentPlayerIdx];
        const currentSpace = boardSpaces[activePlayer.position];
        if (currentSpace.type !== "verb") return;

        const currentKey = getActiveApiKey();
        if (!currentKey) {
          setApiError("⚠️ Por favor configure su API Key de Gemini en los ajustes para usar la generación de imágenes.");
          return;
        }

        setIsGeneratingImage(true);
        setApiError("");

        const prompt = `A clear, simple, cute illustration of the Spanish action verb "${currentSpace.label}" (meaning ${currentSpace.label === 'hacer' ? 'to make' : currentSpace.label}) being performed by a friendly cartoon character, learning card, whiteboard style, bright colors, minimal background, educational Spanish flashcard design.`;

        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${currentKey}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              instances: { prompt: prompt },
              parameters: { sampleCount: 1 }
            })
          });

          if (response.ok) {
            const data = await response.json();
            const base64Bytes = data.predictions?.[0]?.bytesBase64Encoded;
            if (base64Bytes) {
              setGeneratedImageUrl(`data:image/png;base64,${base64Bytes}`);
            } else {
              throw new Error("No image prediction returned.");

                    <div className="flex items-center gap-1.5">
                      <div className="w-3.5 h-3.5 bg-amber-100 border border-amber-400 rounded"></div>
                      <span>Verbos Activos</span>
                    </div>
                    <div className="flex items-center gap-1.5">
                      <div className="w-3.5 h-3.5 bg-emerald-100 border border-emerald-500 rounded"></div>
                      <span>Retrocede (-2)</span>
                    </div>
                    <div className="flex items-center gap-1.5">
                      <div className="w-3.5 h-3.5 bg-pink-100 border border-pink-500 rounded"></div>
                      <span>Avanza (+1 o +2)</span>
                    </div>
                  </div>
                </div>

                {/* Right Column: Game Controls, Dice & AI Evaluator (Desktop Always, Mobile only on tab) */}
                <div className={`lg:col-span-5 space-y-5 ${
                  activeTab === "game" ? "block" : "hidden lg:block"
                }`}>
                  
                  {/* Active Player Status & Actions Card */}
                  <div className="bg-white p-5 md:p-6 rounded-3xl shadow-xl border-2 border-amber-400 relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-24 h-24 bg-amber-100 rounded-full mix-blend-multiply filter blur-xl opacity-70 -mr-6 -mt-6"></div>
                    
                    <div className="flex items-center justify-between mb-4">
                      <div className="flex items-center gap-2">
                        <div className={`w-3 h-3 rounded-full ${activePlayer.colorInfo.bg}`} />
                        <span className="font-extrabold text-[10px] md:text-xs uppercase text-slate-500 tracking-wider">
                          {numPlayers === 1 ? "MODO PRÁCTICA SOLO" : "TURNO ACTUAL"}
                        </span>
                      </div>
                      <button 
                        onClick={() => triggerConfirm("¿Estás seguro de que deseas salir y reiniciar la partida?", resetGame)} 
                        className="text-xs text-red-500 hover:text-red-700 font-bold transition-all min-h-[32px] px-2"
                      >
                        Salir del Juego
                      </button>
                    </div>

                    <div className="flex items-center justify-between flex-wrap gap-2 mb-4">
                      <h3 className="text-xl md:text-2xl font-black text-slate-800 fun-font flex items-center gap-2">
                        <span className={activePlayer.colorInfo.text}>{activePlayer.name}</span>
                        <span className="text-xs bg-slate-100 text-slate-600 font-semibold px-2 py-1 rounded-md">
                          Casilla {activePlayer.position}
                        </span>
                      </h3>
                      {numPlayers === 1 && (
                        <div className="bg-amber-100 border border-amber-200 px-3 py-1 rounded-xl flex items-center gap-1.5 shadow-sm">
                          <span className="text-xs font-bold text-amber-800">🔥 Racha: {streak}</span>
                        </div>
                      )}
                    </div>

                    {/* Dice Rolling Simulator */}
                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex flex-col items-center justify-center gap-4 mb-5">
                      
                      <div className="flex justify-around w-full gap-4">
                        {/* Move Die */}
                        <div className="text-center">
                          <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5">Dado 1 (Avanzar)</span>
                          <div className={`w-14 h-14 md:w-16 md:h-16 rounded-2xl bg-white border-2 border-amber-500 flex items-center justify-center text-2xl md:text-3xl font-black text-amber-700 shadow-md transform ${isRolling ? "animate-spin" : ""}`}>
                            {diceRoll.move}
                          </div>
                        </div>

                        {/* Grammar Person Die */}
                        <div className="text-center">
                          <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5">Dado 2 (Sujeto)</span>
                          <div className={`w-14 h-14 md:w-16 md:h-16 rounded-2xl bg-white border-2 border-indigo-500 flex items-center justify-center text-3xl font-black text-indigo-700 shadow-md transform ${isRolling ? "animate-bounce" : ""}`}>
                            {diceRoll.pronoun}
                          </div>
                        </div>
                      </div>

                      <button
                        onClick={rollDice}
                        disabled={isRolling}
                        className="w-full mt-1 bg-amber-500 hover:bg-amber-600 text-white font-extrabold py-3.5 px-6 rounded-xl shadow-md disabled:bg-slate-300 transition-all font-sans"
                      >
                        {isRolling ? "Lanzando dados..." : "🎲 Lanzar Ambos Dados"}
                      </button>
                    </div>

                    {/* Conjugation Prompt and Workpad */}
                    {currentSpace.type === "verb" && (
                      <div className="space-y-4">
                        <div className="p-4 bg-amber-50/80 rounded-2xl border border-amber-200/60 shadow-inner">
                          <h4 className="text-[10px] md:text-xs font-bold text-amber-900 mb-1 uppercase tracking-wider">TU RETO GRAMATICAL:</h4>
                          <div className="text-base md:text-lg font-black text-amber-950 flex flex-wrap gap-2 items-center">
                            Conjuga <span className="underline decoration-wavy decoration-amber-500">{currentSpace.label}</span> 
                            para <span className="bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded-lg">{PRONOUNS[diceRoll.pronoun].name}</span>
                          </div>
                          <p className="text-[11px] text-slate-500 mt-2">
                            Significado del verbo: <span className="italic font-medium">{currentSpace.label} ({PRONOUNS[diceRoll.pronoun].translation})</span>
                          </p>
                        </div>

                        {/* Tense selector */}
                        <div className="flex items-center gap-2">
                          <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Tiempo:</label>
                          <select 
                            value={selectedTense} 
                            onChange={(e) => setSelectedTense(e.target.value)}
                            className="text-xs bg-slate-100 border-none rounded-lg p-2 font-bold text-slate-700 focus:outline-none"
                          >
                            <option value="Presente">Presente Simple</option>
                            <option value="Pretérito Indefinido">Pretérito Indefinido</option>
                            <option value="Pretérito Imperfecto">Pretérito Imperfecto</option>
                            <option value="Futuro Simple">Futuro Simple</option>
                          </select>
                        </div>

                        {/* Dual Challenge Box (Conjugation + Sentence Challenge) */}
                        <div className="space-y-3.5">
                          <div>
                            <label className="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">
                              1. Conjugación (Conjugation)
                            </label>
                            <input
                              type="text"
                              value={userConjugation}
                              onChange={(e) => setUserConjugation(e.target.value)}
                              placeholder="Escribe tu conjugación aquí..."
                              className="w-full p-3.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-amber-400 outline-none text-base font-bold shadow-sm"
                            />
                        </div>

                        <div>
                          <div className="flex justify-between items-center mb-1.5">
                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">
                              2. Frase completa (Complete Sentence)
                            </label>
                            <span className="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-md">
                              Recomendado
                            </span>
                          </div>
                          <textarea
                            value={userSentence}
                            onChange={(e) => setUserSentence(e.target.value)}
                            placeholder={`Escribe una frase usando tu conjugación...\n(ej: "Yo ${userConjugation || 'hago'} mi tarea hoy")`}
                            className="w-full h-20 p-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-amber-400 outline-none text-sm font-semibold shadow-sm resize-none"
                          />
                        </div>
                        
                        <div className="flex gap-2">
                          <button
                            onClick={evaluateConjugation}
                            disabled={isEvaluating || !userConjugation}
                            className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3.5 px-4 rounded-xl shadow-md disabled:bg-slate-300 transition-all flex items-center justify-center gap-2 min-h-[44px]"
                          >
                            {isEvaluating ? (
                              <span>Evaluando...</span>
                            ) : (
                              <>
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
                                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                                  <polyline points="22 4 12 14.01 9 11.01" />
                                </svg>
                                Evaluar con IA (Gemini)
                              </>
                            )}
                          </button>

                          <button
                            onClick={generateVisualPrompt}
                            disabled={isGeneratingImage}
                            className="bg-purple-600 hover:bg-purple-700 text-white font-extrabold p-3 rounded-xl shadow-md disabled:bg-slate-300 transition-all min-w-[44px] min-h-[44px] flex items-center justify-center"
                            title="Generar imagen del verbo con Imagen 4"
                          >
                            {isGeneratingImage ? "..." : "🎨"}
                          </button>
                        </div>
                      </div>

                      {/* API Error Box */}
                      {apiError && (
                        <div className="p-3 bg-red-100 border border-red-300 rounded-xl text-xs text-red-700">
                          {apiError}
                        </div>
                      )}

                      {/* AI Evaluation Result Card */}
                      {evaluationResult && (
                        <div className={`p-5 rounded-2xl border ${
                          evaluationResult.isCorrect ? "bg-emerald-50 border-emerald-300 text-emerald-950" : "bg-red-50 border-red-300 text-red-950"
                        }`}>
                          
                          {/* Conjugation Verification */}
                          <div className="mb-3">
                            <div className="flex items-center gap-2 mb-2">
                              <span className="text-2xl">{evaluationResult.isCorrect ? "🎉" : "💡"}</span>
                              <span className="font-extrabold uppercase tracking-wide text-xs text-slate-500">
                                {evaluationResult.isCorrect ? "¡EXCELENTE TRABAJO!" : "Casi correcto..."}
                              </span>
                            </div>
                            <p className="font-bold text-base mb-1">
                              Tu conjugación: <span className="italic">{userConjugation}</span>
                            </p>
                            <p className="font-medium text-sm mb-3 text-indigo-900">
                              Forma Correcta: <span className="bg-white/80 px-2.5 py-1 rounded border border-slate-200/50 font-extrabold">{evaluationResult.correctForm}</span>
                            </p>
                            <p className="text-xs text-slate-700 leading-relaxed bg-white/40 p-3 rounded-xl border border-white">
                              {evaluationResult.explanation}
                            </p>
                          </div>

                          {/* Sentence Verification Block */}
                          {userSentence && evaluationResult.sentenceExplanation && (
                            <div className="pt-3.5 border-t border-dashed border-slate-300/80">
                              <div className="flex items-center gap-1.5 mb-2">
                                <span className="text-lg">{evaluationResult.isSentenceCorrect ? "📝" : "✏️"}</span>
                                <span className="font-bold text-xs uppercase tracking-wide text-slate-500">
                                  {evaluationResult.isSentenceCorrect ? "FRASE CORRECTA" : "CORRECCIÓN DE FRASE"}
                                </span>
                              </div>
                              <p className="text-xs text-slate-700 leading-relaxed font-mono italic bg-white/50 p-2 rounded-lg border border-slate-200/60 mb-2 truncate" title={userSentence}>
                                "{userSentence}"
                              </p>
                              <p className="text-xs text-slate-700 leading-relaxed">
                                {evaluationResult.sentenceExplanation}
                              </p>
                            </div>
                          )}
                          
                          <button
                            onClick={nextTurn}
                            className="mt-4 w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 px-4 rounded-xl text-xs transition-all shadow-sm min-h-[44px]"
                          >
                            {numPlayers === 1 ? "Continuar Práctica 👉" : "Siguiente Turno 👉"}
                          </button>
                        </div>
                      )}

                      {/* Imagen 4 AI Generated Visual Card */}
                      {generatedImageUrl && (
                        <div className="mt-4 p-4 bg-slate-100 border border-slate-200 rounded-2xl overflow-hidden flex flex-col items-center animate-fade-in">
                          <span className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Flashcard Visual Prompts (Imagen AI)</span>
                          <img src={generatedImageUrl} alt="Spanish Verb Prompt" className="w-full max-h-60 object-contain rounded-xl shadow-md" />
                        </div>
                      )}
                    </div>
                  )}

                  {currentSpace.type === "start" && (
                    <div className="p-4 bg-blue-50 text-blue-900 rounded-2xl border border-blue-200 text-center">
                      <p className="font-bold">🏁 Estás en la casilla de salida.</p>
                      <p className="text-xs text-blue-700 mt-1">Lanza los dados para emprender tu aventura.</p>
                    </div>
                  )}

                  {currentSpace.type === "finish" && (
                    <div className="p-5 bg-indigo-50 border-2 border-indigo-500 text-indigo-950 rounded-2xl text-center shadow-md animate-pulse">
                      <h4 className="font-black text-2xl mb-1 text-indigo-900">🏆 ¡FELICIDADES! 🏆</h4>
                      <p className="text-sm font-semibold mb-3">Has llegado al final del camino.</p>
                      <p className="text-xs text-indigo-800">¡Dominas las conjugaciones verbales en español perfectamente!</p>
                      <button onClick={resetGame} className="mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl text-xs min-h-[44px]">
                        Jugar de nuevo
                      </button>
                    </div>
                  )}
                </div>

                </div>

                {/* Game Logs / Actions History Column (Desktop right block, Mobile only on tab) */}
                <div className={`lg:col-span-5 bg-white p-5 md:p-6 rounded-3xl shadow-xl border border-slate-100 max-h-[400px] overflow-y-auto ${
                  activeTab === "logs" ? "block" : "hidden lg:block"
                }`}>
                  <h3 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2">
                    <span className="p-2 bg-slate-100 rounded-lg">📋</span>
                    Historial del Juego
                  </h3>
                  
                  <div className="space-y-2.5">
                    {gameLog.length === 0 ? (
                      <p className="text-xs text-slate-400 italic">No hay registros de juego aún.</p>
                    ) : (
                      gameLog.map((log, index) => (
                        <div key={index} className="text-xs text-slate-600 border-b border-slate-100 pb-2 leading-relaxed">
                          {log}
                        </div>
                      ))
                    )}
                  </div>
                </div>

              </div>
              
            </div>
          )}
        </div>
      );
    }

    // Render App
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(App !== undefined ? <App /> : <div>Error loading game app</div>);
  </script>
</body>
</html>
